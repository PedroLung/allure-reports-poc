name: allure-update

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ... (setup anterior igual)

      - name: Download Allure history from S3
        run: |
          # Tenta baixar, se não existir, cria um arquivo vazio pra inicializar o Allure se precisar
          aws s3 cp s3://${{ secrets.S3_BUCKET }}/history/history.jsonl ./history.jsonl || touch history.jsonl

      - name: Run tests
        run: npm test
        continue-on-error: true

      - name: Generate Allure Report
        run: |
          # Forçamos o Allure a ler os resultados e atualizar o history.jsonl
          npm run allure:generate

      - name: Check and Upload History
        if: always()
        run: |
          echo "Buscando o arquivo de histórico..."
          # Se o Allure v3 gerou o arquivo, ele deve estar na raiz ou dentro do report
          if [ -f "history.jsonl" ]; then
            aws s3 cp history.jsonl s3://${{ secrets.S3_BUCKET }}/history/history.jsonl --only-show-errors
            echo "✅ history.jsonl enviado da raiz"
          elif [ -f "allure-report/history/history.jsonl" ]; then
            aws s3 cp allure-report/history/history.jsonl s3://${{ secrets.S3_BUCKET }}/history/history.jsonl
            echo "✅ history.jsonl enviado de dentro do report"
          else
            echo "❌ Erro: history.jsonl não foi encontrado em lugar nenhum!"
            ls -R # Lista tudo pra gente ver onde o Allure escondeu o arquivo
          fi

      - name: Upload Allure Report to S3
        if: always()
        run: |
          aws s3 sync allure-report/ s3://${{ secrets.S3_BUCKET }}/report/ --delete
