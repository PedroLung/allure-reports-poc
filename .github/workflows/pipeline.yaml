name: allure-update

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Debug AWS Identity
        run: aws sts get-caller-identity

      # ... (setup anterior igual)

      - name: Download Allure history from S3
        continue-on-error: true
        run: |
          # Criamos a pasta de resultados antes para garantir
          mkdir -p allure-results
          # O Allure v3 busca o histórico para mesclar. Vamos baixar para a raiz como você configurou.
          aws s3 cp s3://${{ secrets.S3_BUCKET }}/history/history.jsonl ./history.jsonl || echo "Primeira execução, sem histórico ainda."

      - name: Run tests
        run: npm test
        continue-on-error: true

      - name: Generate Allure Report
        run: |
          npm run allure:generate

          # Se o Allure v3 gerou o arquivo na subpasta errada ou na raiz, 
          # nós padronizamos para allure-report/history/
          mkdir -p allure-report/history

          if [ -f "allure-report/history.jsonl" ]; then
            mv allure-report/history.jsonl allure-report/history/history.jsonl
          fi

          # Se por algum motivo ele gerou na raiz
          if [ -f "history.jsonl" ]; then
            cp history.jsonl allure-report/history/history.jsonl
          fi

      - name: Sync History for next build
        if: always()
        run: |
          # Só tenta subir se o arquivo realmente existir para evitar o erro 255
          if [ -f "allure-report/history/history.jsonl" ]; then
            aws s3 cp allure-report/history/history.jsonl s3://${{ secrets.S3_BUCKET }}/history/history.jsonl
            echo "✅ Histórico persistido no S3."
          else
            echo "⚠️ Nenhum histórico gerado ainda (comum no primeiro build)."
          fi

      - name: Upload Allure Report to S3
        if: always()
        run: |
          # Sobe a pasta allure-report (que agora tem a subpasta history lá dentro!)
          aws s3 sync allure-report/ s3://${{ secrets.S3_BUCKET }}/report/ --delete
