name: allure-update

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Debug AWS Identity
        run: aws sts get-caller-identity

      # ... (setup anterior igual)

      - name: Download Allure history from S3
        continue-on-error: true
        run: |
          mkdir -p allure-results
          aws s3 cp s3://${{ secrets.S3_BUCKET }}/history/history.jsonl ./history.jsonl || touch history.jsonl

      - name: Run tests
        run: npm test
        continue-on-error: true

      - name: Generate Allure Report
        run: |
          npm run allure:generate
          # ← REMOVA TODO O BLOCO "FORÇANDO A ESTRUTURA"
          # Não precisa mais criar allure-report/history nem copiar nada

      - name: Sync History for next build
        if: always()
        run: |
          # Agora o history.jsonl já foi atualizado pela CLI (append da nova linha)
          if [ -f "history.jsonl" ]; then
            aws s3 cp history.jsonl s3://${{ secrets.S3_BUCKET }}/history/history.jsonl
            echo "✅ Histórico atualizado e enviado para o S3."
          else
            echo "❌ history.jsonl não encontrado após generate."
          fi

      - name: Upload Allure Report to S3
        if: always()
        run: |
          aws s3 sync allure-report/ s3://${{ secrets.S3_BUCKET }}/report/ --delete
