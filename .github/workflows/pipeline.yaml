name: allure-update

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install Allure CLI (v3)
        run: npm install -g allure

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Download Allure history from S3
        run: |
          aws s3 cp s3://${{ secrets.S3_BUCKET }}/history/ /tmp/allure-history/ \
          --recursive || echo "No history found, starting fresh"

      - name: Run tests
        run: npm test
        continue-on-error: true

      - name: Restore history after tests
        run: |
          mkdir -p allure-results/history
          cp -r /tmp/allure-history/. allure-results/history/ || echo "No history to restore"

      - name: Debug allure-results
        run: |
          echo "=== allure-results ==="
          ls -la allure-results/ || echo "no allure-results"
          echo "=== history ==="
          ls -la allure-results/history/ || echo "no history"

      - name: Generate Allure Report
        run: |
          rm -rf allure-report
          allure generate allure-results -o allure-report

      - name: Upload history back to S3
        run: |
          aws s3 sync allure-report/history/ s3://${{ secrets.S3_BUCKET }}/history/ \
          --delete
