name: allure-update

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Debug AWS Identity
        run: aws sts get-caller-identity

      # ... (setup anterior igual)

      - name: Download Allure history from S3
        continue-on-error: true
        run: |
          # Criamos a pasta de resultados antes para garantir
          mkdir -p allure-results
          # O Allure v3 busca o histórico para mesclar. Vamos baixar para a raiz como você configurou.
          aws s3 cp s3://${{ secrets.S3_BUCKET }}/history/history.jsonl ./history.jsonl || echo "Primeira execução, sem histórico ainda."

      - name: Run tests
        run: npm test
        continue-on-error: true

      - name: Generate Allure Report
        run: |
          # Gera o report
          npm run allure:generate

          # Garante que a pasta history exista dentro do report
          mkdir -p allure-report/history

          # O Allure v3 pode gerar o history atualizado em dois lugares: 
          # na raiz ou dentro do próprio report. Vamos garantir que ele esteja no report.
          if [ -f "history.jsonl" ]; then
            cp history.jsonl allure-report/history/history.jsonl
            echo "✅ History copiado da raiz para o report"
          elif [ -f "allure-report/history.jsonl" ]; then
            mv allure-report/history.jsonl allure-report/history/history.jsonl
            echo "✅ History movido de dentro do report para a subpasta"
          fi

      - name: Sync History for next build
        if: always()
        run: |
          # Salva o arquivo na sua pasta externa do S3 (para o próximo build baixar)
          aws s3 cp history.jsonl s3://${{ secrets.S3_BUCKET }}/history/history.jsonl

      - name: Upload Allure Report to S3
        if: always()
        run: |
          # Sobe a pasta allure-report (que agora tem a subpasta history lá dentro!)
          aws s3 sync allure-report/ s3://${{ secrets.S3_BUCKET }}/report/ --delete
