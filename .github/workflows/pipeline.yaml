name: allure-update

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Debug AWS Identity
        run: aws sts get-caller-identity

      # ... (setup anterior igual)

      - name: Download Allure history from S3
        continue-on-error: true
        run: |
          # Criamos a pasta de resultados antes para garantir
          mkdir -p allure-results
          # O Allure v3 busca o histórico para mesclar. Vamos baixar para a raiz como você configurou.
          aws s3 cp s3://${{ secrets.S3_BUCKET }}/history/history.jsonl ./history.jsonl || echo "Primeira execução, sem histórico ainda."

      - name: Run tests
        run: npm test
        continue-on-error: true

      - name: Generate Allure Report
        run: |
          # O allure.config.js vai ler o ./history.jsonl e gerar o report com a pasta history dentro
          npm run allure:generate

      - name: Sync History back to S3
        if: always()
        run: |
          # Pegamos o histórico NOVO que o Allure acabou de gerar dentro do report e salvamos no S3 para o próximo build
          if [ -d "allure-report/history" ]; then
            aws s3 cp allure-report/history/history.jsonl s3://${{ secrets.S3_BUCKET }}/history/history.jsonl
            echo "✅ Histórico atualizado salvo para o próximo build."
          fi

      - name: Upload Allure Report to S3
        if: always()
        run: |
          # Sobe o report completo (incluindo a pasta history que o allure:generate criou)
          aws s3 sync allure-report/ s3://${{ secrets.S3_BUCKET }}/report/ --delete

      - name: Invalidate CloudFront Cache
        if: always()
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/report/*"
