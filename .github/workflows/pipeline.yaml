name: allure-update

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Debug AWS Identity
        run: aws sts get-caller-identity

      # ... (setup anterior igual)

      - name: Download Allure history from S3
        continue-on-error: true # Importante: no build #1 o arquivo não existe no S3
        run: |
          mkdir -p allure-results
          aws s3 cp s3://${{ secrets.S3_BUCKET }}/history/history.jsonl ./allure-results/history.jsonl

      - name: Run tests
        run: npm test
        continue-on-error: true

      - name: Generate Allure Report
        run: |
          # O Allure v3 vai ler o history.jsonl que baixamos e mesclar com os novos resultados
          npm run allure:generate

      - name: Update History on S3
        if: always()
        run: |
          # O Allure v3 gera o history.jsonl ATUALIZADO dentro da pasta de report
          if [ -f "allure-report/history.jsonl" ]; then
            aws s3 cp allure-report/history.jsonl s3://${{ secrets.S3_BUCKET }}/history/history.jsonl
            echo "✅ Histórico atualizado enviado para o S3"
          else
            echo "⚠️ history.jsonl não encontrado em allure-report/"
          fi

      - name: Upload Allure Report to S3
        if: always()
        run: |
          aws s3 sync allure-report/ s3://${{ secrets.S3_BUCKET }}/report/ --delete
