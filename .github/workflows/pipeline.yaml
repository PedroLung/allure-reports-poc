name: allure-update

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Debug AWS Identity
        run: aws sts get-caller-identity

      # ... (setup anterior igual)

      - name: Download Allure history from S3
        continue-on-error: true
        run: |
          mkdir -p allure-results
          # Baixamos para a raiz para o allure.config.js encontrar
          aws s3 cp s3://${{ secrets.S3_BUCKET }}/history/history.jsonl ./history.jsonl || touch history.jsonl

      - name: Run tests
        run: npm test
        continue-on-error: true

      - name: Generate Allure Report
        run: |
          npm run allure:generate

          # FORÇANDO A ESTRUTURA:
          # O Allure v3 às vezes gera o arquivo mas não cria a pasta 'history'
          mkdir -p allure-report/history

          # Se o arquivo foi atualizado na raiz, movemos para dentro do report
          if [ -f "history.jsonl" ]; then
            cp history.jsonl allure-report/history/history.jsonl
            echo "✅ History manual: Raiz -> allure-report/history/"
          fi

      - name: Sync History for next build
        if: always()
        run: |
          # Agora garantimos que o S3 receba o arquivo que está DENTRO do report
          if [ -f "allure-report/history/history.jsonl" ]; then
            aws s3 cp allure-report/history/history.jsonl s3://${{ secrets.S3_BUCKET }}/history/history.jsonl
            echo "✅ Histórico enviado para o S3."
          else
            echo "❌ Erro crítico: history.jsonl não encontrado nem no report."
          fi

      - name: Upload Allure Report to S3
        if: always()
        run: |
          aws s3 sync allure-report/ s3://${{ secrets.S3_BUCKET }}/report/ --delete
