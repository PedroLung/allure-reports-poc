name: allure-update

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Download Allure history from S3
        run: |
          aws s3 cp s3://${{ secrets.S3_BUCKET }}/history/history.jsonl ./history.jsonl \
          || echo "No history found, starting fresh"

      - name: Run tests
        run: npm test
        continue-on-error: true

      - name: Debug allure-results
        run: |
          echo "=== allure-results ==="
          ls -la allure-results/ || echo "no allure-results"
          echo "=== history.jsonl ==="
          ls -la history.jsonl || echo "no history.jsonl"

      - name: Generate Allure Report
        run: npm run allure:generate

      - name: Upload history back to S3
        run: |
          if [ -f "history.jsonl" ]; then
            aws s3 cp history.jsonl s3://${{ secrets.S3_BUCKET }}/history/history.jsonl --only-show-errors
            echo "✅ History.jsonl uploaded to S3"
          else
            echo "No history file found, skipping upload"
          fi

      - name: Upload Allure Report to S3
        run: |
          aws s3 sync allure-report/ s3://${{ secrets.S3_BUCKET }}/report/ --delete
