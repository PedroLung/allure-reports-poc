name: allure-update

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ... (setup anterior igual)

      - name: Download Allure history from S3
        run: |
          # Criamos a pasta se não existir para evitar erros de permissão
          aws s3 cp s3://${{ secrets.S3_BUCKET }}/history/history.jsonl ./history.jsonl || echo "No history found"

      - name: Run tests
        run: npm test
        continue-on-error: true

      - name: Generate Allure Report
        run: |
          # Garante que o allure vai rodar mesmo se os testes falharem
          # O Allure v3 usa o allure.config.js automaticamente
          npm run allure:generate

      - name: Upload history back to S3
        if: always() # Importante: salvar o histórico mesmo se o teste falhar
        run: |
          if [ -f "history.jsonl" ]; then
            aws s3 cp history.jsonl s3://${{ secrets.S3_BUCKET }}/history/history.jsonl
            echo "✅ History.jsonl atualizado no S3"
          fi

      - name: Upload Allure Report to S3
        if: always()
        run: |
          # O sync com --delete é ótimo para manter o report limpo
          aws s3 sync allure-report/ s3://${{ secrets.S3_BUCKET }}/report/ --delete
